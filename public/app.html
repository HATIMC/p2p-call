<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Calling Platform — Call</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="app-page">

  <!-- ══ Sidebar ═══════════════════════════════════════════════════════════ -->
  <aside id="sidebar">

    <div class="sb-top">
      <div class="sb-brand">
        <span class="sb-logo">📡</span>
        <span class="sb-name">Secret Calling Platform</span>
      </div>
      <div class="sb-me">
        <div class="sb-avatar" id="sb-avatar">?</div>
        <span id="my-username" class="sb-username">…</span>
        <div class="sb-actions">
          <button id="share-link-btn" class="sb-share-btn" title="Copy call link">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6.5 9.5l3-3M7 4.5l.8-.8a3 3 0 014.2 4.2l-.8.8M9 11.5l-.8.8A3 3 0 014 8.1l.8-.8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button id="logout-btn" class="sb-share-btn" title="Logout">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 3H3v10h3M10 5l3 3-3 3M13 8H6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="sb-search">
      <div class="sb-search-inner">
        <svg class="sb-search-icon" width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.6"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <input id="search-input" type="text" placeholder="Search or dial…" autocomplete="off">
        <button id="search-call-btn" class="sb-dial-btn" title="Call" disabled>
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M13.8 11.3l-2.4-.3a1 1 0 00-.8.3l-1.7 1.7a11 11 0 01-5.9-5.9l1.7-1.7a1 1 0 00.3-.8L4.7 2.2A1 1 0 003.7 1.2H2A1 1 0 001 2.3 13 13 0 0013.7 15a1 1 0 001.1-1v-1.7a1 1 0 00-1-1z" fill="currentColor"/></svg>
        </button>
      </div>
    </div>

    <div class="sb-section-title">
      <span>People</span>
      <button id="refresh-btn" class="sb-refresh-btn" title="Refresh list">↻</button>
    </div>

    <ul id="user-list" class="user-list">
      <li class="empty-msg">Loading…</li>
    </ul>

    <p id="sidebar-error" class="sb-error hidden"></p>

  </aside>

  <!-- ══ Main ══════════════════════════════════════════════════════════════ -->
  <main id="main">

    <!-- Idle -->
    <div id="idle-screen" class="screen active">
      <div class="idle-blob"></div>
      <div class="idle-content">
        <div class="idle-icon">📡</div>
        <h2>Ready to connect</h2>
        <p>Pick someone from the list or search by username.</p>
      </div>
    </div>

    <!-- Calling -->
    <div id="calling-screen" class="screen">
      <div class="ringing-card">
        <div class="ringing-pulse">
          <div class="call-avatar" id="calling-avatar">?</div>
        </div>
        <h2 id="calling-label">Calling…</h2>
        <p class="ringing-sub">Waiting for answer</p>
        <button class="btn btn-cancel" id="cancel-call-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Cancel
        </button>
      </div>
    </div>

    <!-- Active call -->
    <div id="call-screen" class="screen">

      <!-- Video area -->
      <div class="call-body">
        <div class="video-wrap">
          <video id="remote-video" autoplay playsinline></video>
          <video id="remote-screen-video" autoplay playsinline class="remote-screen hidden"></video>
          <video id="local-video"  autoplay playsinline muted class="local-pip"></video>
          <video id="local-screen-video" autoplay playsinline muted class="local-screen-pip hidden"></video>

          <!-- Floating controls overlay -->
          <div class="controls-overlay">
            <div class="controls-pill">
              <button class="pill-btn pill-danger" id="hangup-btn" title="Hang up">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 16.9v3a2 2 0 01-2.2 2A19.8 19.8 0 012 4.2 2 2 0 014 2h3a2 2 0 012 1.7c.1 1.3.4 2.5.8 3.6a2 2 0 01-.4 2L8 10.7A16 16 0 0013.3 16l1.4-1.4a2 2 0 012-.4c1.1.4 2.3.7 3.6.8A2 2 0 0122 17z" fill="currentColor"/></svg>
              </button>

              <!-- Mic button: shows one icon; CSS slash overlay when .slashed -->
              <button class="pill-btn pill-off slashed" id="mute-btn" title="Enable microphone">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
                  <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z" fill="currentColor"/>
                  <path d="M19 10v2a7 7 0 01-14 0v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </button>

              <!-- Cam button -->
              <button class="pill-btn pill-off slashed" id="cam-btn" title="Enable camera">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
                  <path d="M23 7l-7 5 7 5V7z" fill="currentColor"/>
                  <rect x="1" y="5" width="15" height="14" rx="2" fill="currentColor"/>
                </svg>
              </button>

              <button class="pill-btn" id="screenshare-btn" title="Share screen">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><rect x="2" y="3" width="20" height="14" rx="2" stroke="currentColor" stroke-width="2"/><path d="M8 21h8M12 17v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              </button>

              <button class="pill-btn" id="whiteboard-btn" title="Whiteboard">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M3 4h18v14H3z" stroke="currentColor" stroke-width="2"/><path d="M8 22h8M12 18v4M7 13l3-3 2 2 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>

              <button class="pill-btn" id="doc-toggle-btn" title="Shared document">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M6 2h8l4 4v16H6z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M14 2v5h5M9 12h6M9 16h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              </button>

              <button class="pill-btn" id="chat-toggle-btn" title="Chat">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
              </button>

              <button class="pill-btn" id="file-send-btn" title="Send file">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.41 17.41a2 2 0 01-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              </button>
              <input type="file" id="file-input" hidden>
            </div>

            <!-- Quality + device row -->
            <div class="controls-sub">
              <div class="quality-group" id="quality-group">
                <button class="q-btn" id="quality-low">Low</button>
                <button class="q-btn q-active" id="quality-medium">Med</button>
                <button class="q-btn" id="quality-high">High</button>
              </div>
              <select id="cam-select"  class="device-select hidden"></select>
              <select id="mic-select"  class="device-select hidden"></select>
            </div>
          </div>

          <div id="whiteboard-panel" class="whiteboard-panel hidden">
            <div class="whiteboard-toolbar">
              <input id="whiteboard-color" type="color" value="#111827" title="Pen color">
              <input id="whiteboard-size" type="range" min="2" max="24" value="5" title="Pen thickness">
              <button id="whiteboard-clear" class="wb-tool-btn" title="Clear whiteboard">Clear</button>
              <button id="whiteboard-close" class="wb-tool-btn" title="Close whiteboard">Close</button>
            </div>
            <canvas id="whiteboard-canvas"></canvas>
          </div>
        </div>

        <!-- Shared document drawer -->
        <div id="doc-panel" class="doc-panel hidden">
          <div class="doc-header">
            <span>Shared Doc</span>
            <button class="doc-close-btn" id="doc-close-btn">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
          </div>
          <textarea id="doc-editor" spellcheck="true" placeholder="Start typing together..."></textarea>
          <div id="doc-status" class="doc-status">P2P document</div>
        </div>

        <!-- Chat drawer -->
        <div id="chat-panel" class="chat-panel hidden">
          <div class="chat-header">
            <span>Chat</span>
            <button class="chat-close-btn" id="chat-close-btn">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
          </div>
          <div id="chat-messages" class="chat-messages"></div>
          <div class="chat-input-row">
            <input id="chat-input" type="text" placeholder="Type a message…" autocomplete="off" maxlength="2000">
            <button id="chat-send-btn" class="chat-send-btn">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M15 8L1 1l3 7-3 7 14-7z" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Transfer bar -->
      <div id="transfer-panel" class="transfer-panel hidden">
        <span id="transfer-direction" class="xfer-dir"></span>
        <span id="transfer-filename" class="xfer-name"></span>
        <div class="xfer-bar"><div id="transfer-progress" class="xfer-fill"></div></div>
        <span id="transfer-pct" class="xfer-pct">0%</span>
      </div>

      <!-- Peer label -->
      <div class="call-footer">In call with <strong id="peer-label">—</strong></div>
    </div>

  </main>

  <!-- ══ Incoming call modal ════════════════════════════════════════════════ -->
  <div id="incoming-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <div class="inc-pulse">
        <div class="call-avatar" id="incoming-avatar">?</div>
      </div>
      <div class="inc-info">
        <div class="inc-name" id="incoming-from-label">—</div>
        <div class="inc-sub">Incoming video call</div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-reject" id="reject-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 16.9v3a2 2 0 01-2.2 2A19.8 19.8 0 012 4.2 2 2 0 014 2h3a2 2 0 012 1.7c.1 1.3.4 2.5.8 3.6a2 2 0 01-.4 2L8 10.7A16 16 0 0013.3 16l1.4-1.4a2 2 0 012-.4c1.1.4 2.3.7 3.6.8A2 2 0 0122 17z" fill="currentColor"/></svg>
        </button>
        <button class="btn btn-accept" id="accept-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 16.9v3a2 2 0 01-2.2 2A19.8 19.8 0 012 4.2 2 2 0 014 2h3a2 2 0 012 1.7c.1 1.3.4 2.5.8 3.6a2 2 0 01-.4 2L8 10.7A16 16 0 0013.3 16l1.4-1.4a2 2 0 012-.4c1.1.4 2.3.7 3.6.8A2 2 0 0122 17z" fill="currentColor"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ══ Toast ═════════════════════════════════════════════════════════════ -->
  <div id="toast" class="toast hidden"></div>

  <script src="/js/app.js"></script>
</body>
</html>
